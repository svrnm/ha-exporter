repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: eslint-web
        name: eslint (web)
        language: system
        entry: web/node_modules/.bin/eslint
        args: [--config, web/eslint.config.js]
        files: ^web/.*\.(js|jsx)$
        pass_filenames: true
      - id: eslint-server
        name: eslint (server)
        language: system
        entry: server/node_modules/.bin/eslint
        args: [--config, server/eslint.config.js]
        files: ^server/.*\.js$
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pylint-dev/pylint
    # v2.17.x fails to install on Python 3.14: old build deps use pkgutil.ImpImporter (removed in 3.12+).
    rev: v4.0.5
    hooks:
      - id: pylint
